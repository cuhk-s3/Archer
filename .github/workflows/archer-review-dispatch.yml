name: Archer Review Dispatch

on:
  workflow_dispatch:
    inputs:
      service_job_id:
        description: Archer service job id
        required: true
        type: string
      pr_id:
        description: LLVM PR id
        required: true
        type: string
      head_sha:
        description: PR head commit sha to review
        required: false
        default: ""
        type: string
      model:
        description: Model name
        required: true
        type: string
      driver:
        description: API driver
        required: true
        type: string
      archer_ref:
        description: Archer repository ref for metadata
        required: false
        default: main
        type: string

run-name: "Archer PR #${{ inputs.pr_id }} / ${{ inputs.service_job_id }}"

jobs:
  review:
    runs-on:
      - self-hosted
      - archer-school

    env:
      ARCHER_REPO_ROOT: ${{ vars.ARCHER_REPO_ROOT }}

    steps:
      - name: Resolve runtime environment
        shell: bash
        run: |
          deps_dir="${LLVM_AUTOREVIEW_DEPS_DIR:-$ARCHER_REPO_ROOT/deps}"
          mkdir -p "$deps_dir"
          echo "LLVM_AUTOREVIEW_DEPS_DIR=$deps_dir" >> "$GITHUB_ENV"

      - name: Validate runner setup
        shell: bash
        run: |
          test -n "$ARCHER_REPO_ROOT"
          test -d "$ARCHER_REPO_ROOT"
          test -x "$ARCHER_REPO_ROOT/deps/py3_venv/bin/python"
          test -n "$LLVM_AUTOREVIEW_DEPS_DIR"
          test -d "$LLVM_AUTOREVIEW_DEPS_DIR"

      - name: Prepare output directory
        shell: bash
        run: |
          out_dir="$ARCHER_REPO_ROOT/service_data/github-actions/${{ inputs.service_job_id }}"
          mkdir -p "$out_dir"
          echo "ARCHER_OUTPUT_DIR=$out_dir" >> "$GITHUB_ENV"

      - name: Run Archer on school CPU runner
        shell: bash
        env:
          ARCHER_HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          cd "$ARCHER_REPO_ROOT"
          source scripts/upenv.sh
          extra_args=()
          if [ -n "$ARCHER_HEAD_SHA" ]; then
            extra_args+=(--fix-commit "$ARCHER_HEAD_SHA")
          fi
          "$ARCHER_REPO_ROOT/deps/py3_venv/bin/python" main.py \
            --pr "${{ inputs.pr_id }}" \
            --model "${{ inputs.model }}" \
            --driver "${{ inputs.driver }}" \
            --stats "$ARCHER_OUTPUT_DIR/run.stats.json" \
            --history "$ARCHER_OUTPUT_DIR/run.history.json" \
            --review "$ARCHER_OUTPUT_DIR/run.review.md" \
            --db-export "$ARCHER_OUTPUT_DIR/run.db.json" \
            "${extra_args[@]}"

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archer-${{ inputs.service_job_id }}
          path: |
            ${{ env.ARCHER_OUTPUT_DIR }}/run.stats.json
            ${{ env.ARCHER_OUTPUT_DIR }}/run.history.json
            ${{ env.ARCHER_OUTPUT_DIR }}/run.review.md
            ${{ env.ARCHER_OUTPUT_DIR }}/run.db.json
          if-no-files-found: warn
