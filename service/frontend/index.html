<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archer Review Board</title>
    <style>
        :root {
            --ink: #1f2d3d;
            --sub: #60758d;
            --line: #eaf0f7;
            --brand-1: #2f6fad;
            --brand-2: #6aa6d6;
            --ok: #1f9956;
            --err: #d64545;
            --run: #c7821f;
            --queue: #6e7d8c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            padding: 12px 14px;
        }

        .shell {
            max-width: 900px;
            margin: 0 auto;
        }

        .brand-strip {
            height: 4px;
            background: linear-gradient(90deg, var(--brand-1), var(--brand-2));
            margin-bottom: 8px;
        }

        .head {
            padding: 12px 12px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            border-bottom: 1px solid var(--line);
        }

        .head-main {
            min-width: 0;
        }

        .head-side {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .head-link {
            color: #5b7086;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.35;
        }

        .head-link strong {
            color: #1f2d3d;
            font-weight: 700;
            margin-right: 4px;
        }

        .title {
            margin: 0;
            font-size: clamp(24px, 3vw, 36px);
            font-weight: 700;
            line-height: 1;
        }

        .sub {
            margin-top: 8px;
            color: var(--sub);
            font-size: 13px;
            max-width: 600px;
        }

        .status {
            color: var(--sub);
            min-height: 20px;
            font-size: 12px;
            padding: 8px 12px 4px;
        }

        .table-wrap {
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 750px;
            table-layout: fixed;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 6px 10px;
            text-align: left;
            vertical-align: top;
            font-size: 13px;
        }

        th {
            color: #2a435a;
            font-weight: 700;
            font-size: 13px;
            background: #f7fbff;
            letter-spacing: 0.02em;
        }

        th:nth-child(1),
        td:nth-child(1) {
            width: 42%;
        }

        th:nth-child(2),
        td:nth-child(2) {
            width: 12%;
        }

        th:nth-child(3),
        td:nth-child(3) {
            width: 10%;
        }

        th:nth-child(4),
        td:nth-child(4) {
            width: 10%;
        }

        th:nth-child(5),
        td:nth-child(5) {
            width: 10%;
        }

        th:nth-child(6),
        td:nth-child(6) {
            width: 16%;
        }

        .pill {
            border-radius: 0;
            padding: 3px 8px;
            display: inline-flex;
            font-weight: 700;
            font-size: 13px;
            gap: 4px;
            align-items: center;
            text-transform: lowercase;
        }

        .pill::before {
            content: '#';
            font-weight: 800;
        }

        .queued {
            color: #6e7d8c;
        }

        .running {
            color: #c7821f;
        }

        .tokenlimit {
            color: #8a5a21;
        }

        .done {
            color: #1f9956;
        }

        .failed {
            color: #d64545;
        }

        .bug-pill {
            border-radius: 0;
            padding: 2px 6px;
            font-size: 13px;
            font-weight: 700;
            display: inline-block;
        }

        .bug-yes {
            background: #fdeaea;
            color: #bb2f2f;
        }

        .bug-no {
            background: #e9f7ef;
            color: #1f9956;
        }

        .bug-unknown {
            background: #f2f5f8;
            color: #6e7d8c;
        }

        .tags {
            margin-top: 2px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .tag {
            background: #eef5fc;
            color: #2f6fad;
            padding: 2px 6px;
            font-size: 12px;
        }

        .date-chip {
            display: inline-block;
            padding: 2px 8px;
            background: #f2f6fb;
            color: #4e657b;
            font-size: 12px;
            white-space: nowrap;
        }

        .pr-header {
            line-height: 1.4;
        }

        .pr-title-text {
            color: #1f2d3d;
            font-size: 13px;
            font-weight: 600;
        }

        .pr-link {
            color: #1750a6;
            font-size: 13px;
            font-weight: 700;
            display: inline;
            margin-right: 8px;
        }

        a {
            color: #1750a6;
            text-decoration: none;
            font-weight: 700;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 750px) {
            .head {
                align-items: flex-start;
                flex-direction: column;
            }

            .head-side {
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="brand-strip"></div>
        <div class="head">
            <div class="head-main">
                <h1 class="title">Archer Review Board</h1>
                <div class="sub">Frontend is static. Jobs and artifacts are fetched from backend API.</div>
            </div>
            <div class="head-side">
                <a class="head-link" href="https://github.com/cuhk-s3/Archer" target="_blank"
                    rel="noreferrer"><strong>GitHub:</strong> cuhk-s3/Archer</a>
                <a class="head-link" href="https://cardigan1008.github.io" target="_blank"
                    rel="noreferrer"><strong>Developed by:</strong> Yunbo Ni</a>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>PR</th>
                        <th>State</th>
                        <th>Bug</th>
                        <th>Review</th>
                        <th>History</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <script src="./runtime-config.js"></script>
    <script>
        const BACKEND_BASE_URL = (window.ARCHER_BACKEND_BASE_URL || "http://127.0.0.1:8080").replace(/\/$/, "");
        const REFRESH_MS = 5000;

        function esc(v) {
            return (v || "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[m]));
        }

        function formatDate(isoStr) {
            if (!isoStr) return "";
            const d = new Date(isoStr);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, "0");
            const day = String(d.getDate()).padStart(2, "0");
            const h = String(d.getHours()).padStart(2, "0");
            const min = String(d.getMinutes()).padStart(2, "0");
            return y + "-" + m + "-" + day + " " + h + ":" + min;
        }

        function stateMeta(status) {
            if (status === "succeeded") return { label: "done", cls: "done" };
            if (status === "running") return { label: "running", cls: "running" };
            if (status === "tokenlimit") return { label: "tokenlimit", cls: "tokenlimit" };
            if (status === "failed") return { label: "failed", cls: "failed" };
            if (status === "queued") return { label: "queued", cls: "queued" };
            return { label: "unknown", cls: "queued" };
        }

        function buildArtifactUrl(path) {
            return BACKEND_BASE_URL + "/artifact?path=" + encodeURIComponent(path);
        }

        function renderRows(jobs) {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = jobs.map(j => {
                const state = stateMeta(j.status);
                const prCell = '<div class="pr-header"><a class="pr-link" href="https://github.com/llvm/llvm-project/pull/' + j.pr_id + '" target="_blank">#' + j.pr_id + '</a><span class="pr-title-text">' + esc(j.title || "(no title)") + '</span></div>'
                    + (j.components && j.components.length ? '<div class="tags">' + j.components.map(c => '<span class="tag">' + esc(c) + '</span>').join("") + '</div>' : "");
                const stateCell = '<span class="pill ' + esc(state.cls) + '">' + esc(state.label) + '</span>';
                const bugCell = j.bug_found === true
                    ? '<span class="bug-pill bug-yes">found</span>'
                    : (j.bug_found === false
                        ? '<span class="bug-pill bug-no">none</span>'
                        : '<span class="bug-pill bug-unknown">unknown</span>');
                const reviewLink = j.review_path
                    ? '<a href="' + buildArtifactUrl(j.review_path) + '" target="_blank">view</a>'
                    : (j.remote_run_url ? '<a href="' + esc(j.remote_run_url) + '" target="_blank">run</a>' : "—");
                const historyLink = j.history_path ? '<a href="' + buildArtifactUrl(j.history_path) + '" target="_blank">view</a>' : "—";
                const dateStr = formatDate(j.updated_at);
                return '<tr><td>' + prCell + '</td><td>' + stateCell + '</td><td>' + bugCell + '</td><td>' + reviewLink + '</td><td>' + historyLink + '</td><td><span class="date-chip">' + dateStr + '</span></td></tr>';
            }).join("");
        }

        async function refreshJobs() {
            const statusEl = document.getElementById("status");
            try {
                const resp = await fetch(BACKEND_BASE_URL + "/api/jobs");
                if (!resp.ok) throw new Error("HTTP " + resp.status);
                const data = await resp.json();
                const jobs = (data && data.jobs) || [];
                renderRows(jobs);
                statusEl.textContent = "Backend: " + BACKEND_BASE_URL + " | Jobs: " + jobs.length + " | Last sync: " + new Date().toLocaleTimeString();
            } catch (err) {
                statusEl.textContent = "Failed to load jobs from backend: " + err;
            }
        }

        setInterval(refreshJobs, REFRESH_MS);
        refreshJobs();
    </script>
</body>

</html>
